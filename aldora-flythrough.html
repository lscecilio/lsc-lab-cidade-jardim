function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}
function lerp(a,b,t) { return a + (b - a) * t; }

function getCameraAt(p) {
  // Find surrounding keyframes
  let i = 0;
  for (let k = 0; k < keyframes.length - 1; k++) {
    if (p >= keyframes[k].t && p <= keyframes[k+1].t) { i = k; break; }
    if (k === keyframes.length - 2) i = k;
  }
  const kf0 = keyframes[i], kf1 = keyframes[i+1];
  const segLen = kf1.t - kf0.t;
  const localT = segLen > 0 ? Math.min(1, Math.max(0, (p - kf0.t) / segLen)) : 0;
  const e = easeInOutCubic(localT);
  return {
    center: [lerp(kf0.center[0],kf1.center[0],e), lerp(kf0.center[1],kf1.center[1],e)],
    zoom: lerp(kf0.zoom, kf1.zoom, e),
    pitch: lerp(kf0.pitch, kf1.pitch, e),
    bearing: lerp(kf0.bearing, kf1.bearing, e),
  };
}

// ───── MAP INITIALIZATION ─────
const map_config = {
  container: 'map',
  style: 'mapbox://styles/mapbox/satellite-streets-v12',
  center: [-48.3062, -18.9600],
  zoom: 13,
  pitch: 0,
  bearing: 0,
  antialias: true,
  preserveDrawingBuffer: true, // needed for screenshot/recording
};

map = new mapboxgl.Map(map_config);

// Loading progress simulation
let loadProg = 0;
const loadInterval = setInterval(() => {
  loadProg = Math.min(loadProg + Math.random()*12, 90);
  document.getElementById('load-progress').style.width = loadProg + '%';
}, 200);

map.on('load', () => {
  clearInterval(loadInterval);
  document.getElementById('load-progress').style.width = '100%';

  // Add terrain
  map.addSource('mapbox-dem', {
    type: 'raster-dem',
    url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
    tileSize: 512,
    maxzoom: 14
  });
  map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.3 });

  // Atmosphere
  map.setFog({
    range: [0.5, 10],
    color: '#12182a',
    'high-color': '#0a0d14',
    'horizon-blend': 0.15,
    'space-color': '#060810',
    'star-intensity': 0.3
  });

  // Sky layer
  if (!map.getLayer('sky')) {
    map.addLayer({
      id: 'sky',
      type: 'sky',
      paint: {
        'sky-type': 'atmosphere',
        'sky-atmosphere-sun': [0, 30],
        'sky-atmosphere-sun-intensity': 5
      }
    });
  }

  // ── Macro Boundary ──
  map.addSource('macro-boundary', {
    type: 'geojson',
    data: { type:'Feature', geometry:{ type:'Polygon', coordinates:[macroBoundary] }}
  });
  map.addLayer({
    id:'macro-fill', type:'fill', source:'macro-boundary',
    paint:{ 'fill-color':'rgba(200,168,75,0.04)', 'fill-opacity':0.8 }
  });
  map.addLayer({
    id:'macro-line', type:'line', source:'macro-boundary',
    paint:{ 'line-color':'rgba(200,168,75,0.25)', 'line-width':1.5, 'line-dasharray':[8,6] }
  });

  // ── Quadra fills ──
  const qStyles = {
    QC01: { fill:'rgba(200,168,75,0.18)', line:'#C8A84B' },
    QC02: { fill:'rgba(160,112,32,0.18)', line:'#A07020' },
    QC03: { fill:'rgba(255,208,96,0.12)', line:'#FFD060' },
  };
  Object.entries(quadras).forEach(([qid, coords]) => {
    map.addSource('quadra-'+qid, {
      type:'geojson',
      data:{type:'Feature',geometry:{type:'Polygon',coordinates:[coords]}}
    });
    map.addLayer({
      id:'quadra-fill-'+qid, type:'fill', source:'quadra-'+qid,
      paint:{'fill-color':qStyles[qid].fill,'fill-opacity':0.8}
    });
    map.addLayer({
      id:'quadra-line-'+qid, type:'line', source:'quadra-'+qid,
      paint:{'line-color':qStyles[qid].line,'line-width':1.5,'line-dasharray':[5,3],'line-opacity':0.8}
    });
  });

  // ── Park ──
  map.addSource('park', {
    type:'geojson',
    data:{type:'Feature',geometry:{type:'Polygon',coordinates:[park]}}
  });
  map.addLayer({
    id:'park-fill', type:'fill', source:'park',
    paint:{'fill-color':'rgba(58,122,69,0.35)','fill-opacity':0.8}
  });
  map.addLayer({
    id:'park-line', type:'line', source:'park',
    paint:{'line-color':'#3a7a45','line-width':1.5,'line-dasharray':[4,3]}
  });

  // ── Tower extrusions ──
  const towerFeatures = towers.map(t => ({
    type:'Feature',
    properties:{ id:t.id, height:t.h, color:t.color, floors:t.floors, quadra:t.quadra, emp:t.emp },
    geometry:{ type:'Polygon', coordinates:[towerPoly(t.lng, t.lat)] }
  }));
  map.addSource('towers', {
    type:'geojson',
    data:{ type:'FeatureCollection', features:towerFeatures }
  });
  map.addLayer({
    id:'tower-extrusions', type:'fill-extrusion', source:'towers',
    paint:{
      'fill-extrusion-color':['get','color'],
      'fill-extrusion-height':['get','height'],
      'fill-extrusion-base':0,
      'fill-extrusion-opacity':0.78,
      'fill-extrusion-vertical-gradient':true
    }
  });

  // ── Tower labels ──
  const labelFeatures = towers.map(t => ({
    type:'Feature',
    properties:{ label: t.id, height:t.h },
    geometry:{ type:'Point', coordinates:[t.lng, t.lat] }
  }));
  map.addSource('tower-labels', {
    type:'geojson',
    data:{ type:'FeatureCollection', features:labelFeatures }
  });
  map.addLayer({
    id:'tower-label-layer', type:'symbol', source:'tower-labels',
    layout:{
      'text-field':['get','label'],
      'text-font':['DIN Pro Bold','Arial Unicode MS Bold'],
      'text-size':11,
      'text-anchor':'center',
      'symbol-sort-key':['-',['get','height']]
    },
    paint:{
      'text-color':'#f0ece4',
      'text-halo-color':'rgba(10,13,20,0.9)',
      'text-halo-width':2
    }
  });

  // ── Existing buildings ──
  const layers = map.getStyle().layers;
  let labelLayerId;
  for (const l of layers) {
    if (l.type === 'symbol' && l.layout && l.layout['text-field']) { labelLayerId = l.id; break; }
  }
  map.addLayer({
    id:'3d-buildings', source:'composite', 'source-layer':'building', type:'fill-extrusion',
    minzoom:13,
    filter:['==','extrude','true'],
    paint:{
      'fill-extrusion-color':'#1a2a3a',
      'fill-extrusion-height':['interpolate',['linear'],['zoom'],13,0,13.05,['get','height']],
      'fill-extrusion-base':['interpolate',['linear'],['zoom'],13,0,13.05,['get','min_height']],
      'fill-extrusion-opacity':0.55
    }
  }, labelLayerId);

  // Done loading – show UI
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('controls').classList.remove('hidden');
    document.getElementById('corner-brand').classList.add('visible');
    buildChapterMarkers();
  }, 800);
});

// ───── CHAPTER MARKERS ─────
function buildChapterMarkers() {
  const wrap = document.getElementById('progress-wrap');
  chapters.forEach(ch => {
    const m = document.createElement('div');
    m.className = 'chapter-marker';
    m.style.left = (ch.t * 100) + '%';
    wrap.appendChild(m);
  });
}

// ───── TEXT OVERLAY ENGINE ─────
const overlayEl = document.getElementById('overlay');
let currentCueIdx = -1;

function updateOverlay(p) {
  let idx = -1;
  for (let i = 0; i < textCues.length; i++) {
    if (p >= textCues[i].tStart && p < textCues[i].tEnd) { idx = i; break; }
  }
  if (idx === currentCueIdx) return;
  currentCueIdx = idx;

  // Fade out existing
  const existing = overlayEl.querySelectorAll('.overlay-line');
  existing.forEach(el => el.classList.remove('visible'));

  setTimeout(() => {
    overlayEl.innerHTML = '';
    if (idx < 0) return;
    const cue = textCues[idx];
    cue.lines.forEach((line, li) => {
      const div = document.createElement('div');
      div.className = 'overlay-line ' + line.cls;
      div.textContent = line.text;
      overlayEl.appendChild(div);
      setTimeout(() => div.classList.add('visible'), 80 + li * 150);
    });
  }, 300);
}

// ───── END CARD ─────
function showEndCard(show) {
  document.getElementById('endcard').classList.toggle('visible', show);
}

// ───── ANIMATION LOOP ─────
function animate(timestamp) {
  if (!playing) return;
  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = (timestamp - lastFrameTime) * speed;
  lastFrameTime = timestamp;

  progress += dt / TOTAL_DURATION;
  if (progress >= 1) {
    progress = 1;
    playing = false;
    document.getElementById('btn-play').textContent = '▶';
    showEndCard(true);
  }

  applyCamera(progress);
  updateOverlay(progress);
  updateProgressUI();

  if (playing) animId = requestAnimationFrame(animate);
}

function applyCamera(p) {
  const cam = getCameraAt(Math.min(p, 1));
  map.jumpTo({
    center: cam.center,
    zoom: cam.zoom,
    pitch: cam.pitch,
    bearing: cam.bearing
  });
}

// ───── UI UPDATES ─────
function updateProgressUI() {
  const bar = document.getElementById('progress-bar');
  bar.style.width = (progress * 100) + '%';
  const elapsed = Math.floor(progress * 60);
  const total = 60;
  const eMin = Math.floor(elapsed / 60);
  const eSec = (elapsed % 60).toString().padStart(2,'0');
  document.getElementById('time-display').textContent = eMin+':'+eSec+' / 1:00';
}

// ───── CONTROLS ─────
document.getElementById('btn-play').addEventListener('click', () => {
  if (progress >= 1) {
    progress = 0;
    showEndCard(false);
  }
  playing = !playing;
  document.getElementById('btn-play').textContent = playing ? '⏸' : '▶';
  if (playing) {
    lastFrameTime = null;
    animId = requestAnimationFrame(animate);
  }
});

document.getElementById('btn-restart').addEventListener('click', () => {
  progress = 0;
  playing = false;
  lastFrameTime = null;
  document.getElementById('btn-play').textContent = '▶';
  showEndCard(false);
  applyCamera(0);
  updateOverlay(0);
  updateProgressUI();
});

// Speed toggle
const speeds = [0.5, 1, 1.5, 2];
let speedIdx = 1;
document.getElementById('speed-btn').addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % speeds.length;
  speed = speeds[speedIdx];
  document.getElementById('speed-btn').textContent = speed + '×';
});

// Progress bar scrub
document.getElementById('progress-wrap').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  progress = Math.max(0, Math.min(1, x));
  showEndCard(progress >= 1);
  applyCamera(progress);
  updateOverlay(progress);
  updateProgressUI();
});

// ── Scrub drag ──
let scrubbing = false;
document.getElementById('progress-wrap').addEventListener('mousedown', (e) => {
  scrubbing = true;
  const rect = e.currentTarget.getBoundingClientRect();
  progress = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  applyCamera(progress);
  updateOverlay(progress);
  updateProgressUI();
});
document.addEventListener('mousemove', (e) => {
  if (!scrubbing) return;
  const rect = document.getElementById('progress-wrap').getBoundingClientRect();
  progress = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  showEndCard(false);
  applyCamera(progress);
  updateOverlay(progress);
  updateProgressUI();
});
document.addEventListener('mouseup', () => { scrubbing = false; });

// ───── SCREENSHOT ─────
document.getElementById('btn-screenshot').addEventListener('click', () => {
  try {
    const canvas = map.getCanvas();
    const link = document.createElement('a');
    link.download = 'aldora-flythrough-' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(err) {
    console.error('Screenshot failed:', err);
    alert('Erro ao capturar screenshot. Tente abrir via HTTP server.');
  }
});

// ───── VIDEO RECORDING ─────
document.getElementById('btn-record').addEventListener('click', () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  try {
    const canvas = map.getCanvas();
    const stream = canvas.captureStream(30);
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType:'video/webm;codecs=vp9', videoBitsPerSecond: 8000000 });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type:'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'aldora-flythrough-' + Date.now() + '.webm';
      a.click();
      URL.revokeObjectURL(url);
      document.getElementById('rec-indicator').classList.remove('visible');
      document.getElementById('btn-record').classList.remove('recording');
      document.getElementById('btn-record').innerHTML = '<span class="icon">⏺</span> Gravar';
      clearInterval(recTimerInterval);
    };
    mediaRecorder.start();
    recStartTime = Date.now();
    document.getElementById('rec-indicator').classList.add('visible');
    document.getElementById('btn-record').classList.add('recording');
    document.getElementById('btn-record').innerHTML = '<span class="icon">⏹</span> Parar';
    recTimerInterval = setInterval(() => {
      const s = Math.floor((Date.now() - recStartTime) / 1000);
      const m = Math.floor(s / 60);
      document.getElementById('rec-time').textContent =
        m.toString().padStart(2,'0') + ':' + (s % 60).toString().padStart(2,'0');
    }, 500);
  } catch(err) {
    console.error('Recording failed:', err);
    alert('Gravação não suportada neste navegador.');
  }
});

// ───── MUSIC PLACEHOLDER ─────
document.getElementById('btn-music').addEventListener('click', () => {
  alert('🎵 Recurso de música será adicionado em breve.\n\nDica: Use um editor de vídeo para adicionar trilha sonora ao arquivo .webm exportado.');
});

// ───── KEYBOARD SHORTCUTS ─────
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('btn-play').click(); }
  if (e.code === 'KeyR') document.getElementById('btn-restart').click();
  if (e.code === 'KeyS') document.getElementById('btn-screenshot').click();
  if (e.code === 'ArrowRight') { progress = Math.min(1, progress + 0.02); applyCamera(progress); updateOverlay(progress); updateProgressUI(); }
  if (e.code === 'ArrowLeft') { progress = Math.max(0, progress - 0.02); applyCamera(progress); updateOverlay(progress); updateProgressUI(); }
});
</script>
